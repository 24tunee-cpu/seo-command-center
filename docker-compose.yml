version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: seo-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: seo_command_center
    volumes:
      - mongodb_data:/data/db
    networks:
      - seo-network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: seo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - seo-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seo-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/seo_command_center?authSource=admin
      - MONGODB_DB_NAME=seo_command_center
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-production-secret-key-change-this
      - DEBUG=false
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
    networks:
      - seo-network

  # Celery Worker
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seo-celery
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/seo_command_center?authSource=admin
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-production-secret-key-change-this
    depends_on:
      - mongodb
      - redis
      - backend
    volumes:
      - ./backend:/app
    networks:
      - seo-network

  # Flower (Celery Monitoring)
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seo-flower
    restart: unless-stopped
    command: celery -A app.workers.celery_app flower --port=5555
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery
    networks:
      - seo-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: seo-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    networks:
      - seo-network

volumes:
  mongodb_data:
  redis_data:

networks:
  seo-network:
    driver: bridge
